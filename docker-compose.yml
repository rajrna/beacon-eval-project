version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: beacon
      POSTGRES_PASSWORD: beacon
      POSTGRES_DB: beacon
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beacon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn beacon.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./infra/env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://beacon:beacon@postgres:5432/beacon
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: local
      DEBUG: "true"
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID}
      BEDROCK_SAFETY_MODEL_ID: ${BEDROCK_SAFETY_MODEL_ID}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Eval Worker ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: rq worker --url redis://redis:6379/0 beacon-eval beacon-safety beacon-export
    env_file:
      - ./infra/env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://beacon:beacon@postgres:5432/beacon
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: local
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend ────────────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      VITE_ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  # ── Migrations (run once then exit) ─────────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    env_file:
      - ./infra/env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://beacon:beacon@postgres:5432/beacon
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  postgres_data:
  redis_data:
