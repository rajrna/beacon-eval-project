name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  API_IMAGE: beacon-api
  WORKER_IMAGE: beacon-worker
  WEB_IMAGE: beacon-web

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ steps.meta.outputs.tag }},${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ steps.meta.outputs.tag }},${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.API_URL }}
          VITE_ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.tag }},${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:latest

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run migrations
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp exec \
              --name beacon-api \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --command "alembic upgrade head"

      - name: Update API container
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name beacon-api \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Update worker container
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name beacon-worker \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Update web container
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name beacon-web \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Verify deployment
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp show \
              --name beacon-api \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --query "properties.latestRevisionName" -o tsv
